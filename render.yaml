services:
  - type: web
    name: fakestore-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: gunicorn --chdir app wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DASHBOARD_PASSWORD
        value: "admin"
      - key: API_KEY
        generateValue: true
      # DATABASE_URL: Set this to your Neon PostgreSQL connection string
      # e.g. postgresql://user:pass@ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require
      - key: DATABASE_URL
        sync: false