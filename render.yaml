services:
  - type: web
    name: fakestore-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: gunicorn --chdir app server:create_app\\(\\) --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DASHBOARD_PASSWORD
        value: "admin"
      - key: DATABASE_URL
        value: "/opt/render/project/data/store.db"
      - key: API_KEY
        generateValue: true
    disk:
      name: fakestore-data
      mountPath: /opt/render/project/data
      sizeGB: 1